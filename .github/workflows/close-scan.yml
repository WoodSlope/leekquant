name: Verify Demo Data

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-demo-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate fixed demo files
        run: |
          python -m json.tool public-data/latest-scan.json > /dev/null
          python -m json.tool public-data/run-status.json > /dev/null
          python -m json.tool public-data/market-snapshot.json > /dev/null
