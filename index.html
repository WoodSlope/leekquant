<body class="bg-[#0D0E11] text-zinc-300 antialiased overflow-hidden">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 持久化状态 Hook ---
        function useStickyState(defaultValue, key) {
            const [value, setValue] = useState(() => {
                const stickyValue = window.localStorage.getItem(key);
                if (stickyValue === null) return defaultValue;
                try {
                    return JSON.parse(stickyValue);
                } catch (error) {
                    window.localStorage.removeItem(key);
                    return defaultValue;
                }
            });
            useEffect(() => {
                window.localStorage.setItem(key, JSON.stringify(value));
            }, [key, value]);
            return [value, setValue];
        }

        const SCAN_DB_NAME = 'leek-strategy-scans';
        const SCAN_STORE_NAME = 'scanRecords';
        const scanRecordKey = (strategyId) => `strategy:${strategyId}`;

        const openScanDb = () => new Promise((resolve, reject) => {
            if (!window.indexedDB) {
                resolve(null);
                return;
            }
            const request = window.indexedDB.open(SCAN_DB_NAME, 1);
            request.onupgradeneeded = () => {
                const db = request.result;
                if (!db.objectStoreNames.contains(SCAN_STORE_NAME)) {
                    db.createObjectStore(SCAN_STORE_NAME, { keyPath: 'key' });
                }
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });

        const saveScanRecord = async ({ strategyId, strategyName, data }) => {
            const db = await openScanDb();
            if (!db || !strategyId || !data) return;
            return new Promise((resolve, reject) => {
                const tx = db.transaction(SCAN_STORE_NAME, 'readwrite');
                tx.objectStore(SCAN_STORE_NAME).put({
                    key: scanRecordKey(strategyId),
                    strategyId,
                    strategyName,
                    savedAt: new Date().toISOString(),
                    tradeDate: data.tradeDate || data.providerDate || '',
                    data
                });
                tx.oncomplete = () => resolve(true);
                tx.onerror = () => reject(tx.error);
            }).finally(() => db.close());
        };

        const loadLatestScanRecord = async (strategyId) => {
            const db = await openScanDb();
            if (!db || !strategyId) return null;
            return new Promise((resolve, reject) => {
                const tx = db.transaction(SCAN_STORE_NAME, 'readonly');
                const request = tx.objectStore(SCAN_STORE_NAME).get(scanRecordKey(strategyId));
                request.onsuccess = () => resolve(request.result || null);
                request.onerror = () => reject(request.error);
            }).finally(() => db.close());
        };

        // --- 模拟 SVG 图标库 ---

            ArrowRight: ({size=16, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>,

        // ==========================================
        // UI规范组件：通用卡片 (Dashboard Card)
        // ==========================================
        const Card = ({ title, actions, children, className = "", bodyClass = "p-4 md:p-6", headerClass = "px-4 md:px-6 py-3" }) => (

                    <div className={`min-h-14 ${headerClass} border-b border-zinc-800/60 flex items-center justify-between bg-[#111216]/95 shrink-0 gap-3 w-full min-w-0`}>

                        {actions && <div className="flex items-center gap-3 flex-wrap justify-end shrink-0">{actions}</div>}
                    </div>
                )}
                <div className={`flex-1 ${bodyClass}`}>
                    {children}
                </div>
            </div>
        );

        const Badge = ({ type, children }) => {
            const styles = {
                pass: "bg-green-950/60 text-green-400 border-green-800/50",
                fail: "bg-red-950/60 text-red-400 border-red-800/50",

                ready: "bg-blue-950/60 text-blue-400 border-blue-800/50",
                warning: "bg-yellow-950/60 text-yellow-400 border-yellow-800/50"
            };
            return <span className={`border text-xs px-1.5 py-0.5 rounded-md font-mono font-medium ${styles[type] || styles.neutral}`}>{children}</span>;
        };

        const META_PILL_CLASS = "inline-flex h-9 items-center gap-2 rounded-lg border border-zinc-800/80 bg-[#111216] px-3 text-sm shadow-inner shadow-black/20";
        const META_LABEL_CLASS = "text-xs text-zinc-500 shrink-0";
        const META_VALUE_CLASS = "text-sm font-mono text-zinc-200 whitespace-nowrap";
        const META_MENU_CLASS = "absolute right-0 top-[calc(100%+6px)] z-30 min-w-[132px] overflow-hidden rounded-lg border border-zinc-700/80 bg-[#16181D] p-1 shadow-[0_18px_50px_rgba(0,0,0,0.45)]";
        const BOARD_FILTER_GROUP_CLASS = "flex items-center gap-3 flex-wrap justify-end";

        const PageShell = ({ children, className = "" }) => (
            <div className={`flex-1 flex flex-col p-4 md:p-6 overflow-y-auto w-full gap-4 md:gap-5 ${className}`}>
                {children}
            </div>
        );

        const PageHeader = ({ eyebrow, title, subtitle, actions, stats }) => (
            <div className="shrink-0 border border-zinc-800/70 rounded-lg bg-[#15171C]/95 shadow-[0_18px_60px_rgba(0,0,0,0.24)] overflow-hidden">
                <div className="px-4 py-3 md:px-5 md:py-3.5 flex flex-col lg:flex-row lg:items-start lg:justify-between gap-3">
                    <div className="min-w-0">
                        {eyebrow && <div className="text-[10px] font-mono text-zinc-500 mb-1.5">{eyebrow}</div>}
                        <h1 className="text-lg md:text-xl font-bold text-zinc-100 tracking-normal">{title}</h1>
                        {subtitle && <p className="text-sm text-zinc-500 mt-1 leading-5 max-w-3xl">{subtitle}</p>}
                    </div>
                    {actions && <div className="flex items-center gap-2 flex-wrap shrink-0">{actions}</div>}
                </div>
                {stats && <div className="grid grid-cols-2 lg:grid-cols-4 border-t border-zinc-800/60 divide-x divide-y lg:divide-y-0 divide-zinc-800/60">{stats}</div>}
            </div>
        );

        const StatBlock = ({ label, value, tone = "text-zinc-100" }) => (
            <div className="px-4 md:px-5 py-2.5 min-w-0 bg-[#111216]/70">
                <div className="text-[10px] font-mono text-zinc-500 mb-1 truncate">{label}</div>
                <div className={`text-base md:text-lg font-bold font-mono truncate ${tone}`}>{value}</div>
            </div>
        );

        const NOTICE_SURFACE_CLASS = "bg-[#14130F]/95 border-yellow-900/35 text-yellow-100/80";
        const NOTICE_FRAME_CLASS = "shrink-0 rounded-lg border px-3.5 py-2 text-xs md:text-sm leading-5 flex items-center gap-3";

        const NoticeStrip = ({ type = "neutral", children, onDismiss }) => {
            const style = NOTICE_SURFACE_CLASS;
            const label = type === 'warning' || type === 'danger' ? '风险提示' : '提示';
            return (
                <div className={`${NOTICE_FRAME_CLASS} ${style}`}>
                    <Icons.AlertTriangle size={14} className="shrink-0 text-yellow-500/80" />
                    <span className="sr-only">{label}</span>
                    <span className="min-w-0 flex-1">{children}</span>
                    {onDismiss && (
                        <button onClick={onDismiss} aria-label="关闭提示" className="shrink-0 text-yellow-700/80 hover:text-yellow-300 transition-colors px-1 leading-none">
                            ×
                        </button>
                    )}
                </div>
            );
        };

        const RULE_TEMPLATES = {
            s1: {
                '恐慌中找强势': ['s1_drop', 's1_close', 's1_vol_panic', 's1_inverse'],
                '趋势突破': ['s1_ma20', 's1_high', 's1_plat'],
                '均值回归': ['s1_pullback', 's1_shadow', 's1_pm'],
                '事件驱动': ['s1_surge', 's1_gap', 's1_vol_panic']
            },
            s2: {
                '稳健型': ['s2_ma', 's2_fund', 's2_macd', 's2_super'],
                '量价型': ['s2_ma', 's2_fund', 's2_vol'],
                '反转型': ['s2_rsi', 's2_main'],
                '跟随型': ['s2_ma', 's2_north', 's2_super']
            },
            s3: {
                '保守套件': ['s3_hard', 's3_break', 's3_trail'],
                '激进套件': ['s3_hard', 's3_trail', 's3_sun'],
                '量价套件': ['s3_break', 's3_fund', 's3_stag'],
                '系统性防御': ['s3_hard', 's3_market', 's3_break']
            }
        };

        const DEFAULT_PARAMS = {
            s0_ma: '250', s0_limit: '50', s0_crash: '3',
            s1_drop: '1.0', s1_vol_panic: '1.5', s1_pm: '13:30', s1_high: '20', s1_plat_days: '20', s1_plat_amp: '10', s1_pullback: '5', s1_shadow: '2', s1_surge: '5',
            s2_ma: '50', s2_fund: '5', s2_macd: '12/26/9', s2_super: '1', s2_vol: '2.0', s2_rsi_period: '14', s2_rsi_level: '30', s2_main: '10', s2_north_days: '5', s2_north_pct: '0.1',
            s3_hard: '-8.0', s3_break_ma: '20', s3_break_vol: '1.5', s3_trail: '10', s3_sun: '3', s3_fund: '5', s3_stag_vol: '3.0', s3_stag_gain: '1', s3_market_limit: '50'
        };

        const createRuleConfig = (overrides = {}) => ({
            globalTpl: '保守型',
            s1Tpl: '恐慌中找强势',
            s2Tpl: '稳健型',
            s3Tpl: '保守套件',
            s0Keys: ['s0_ma', 's0_limit', 's0_crash'],
            s1Keys: [...RULE_TEMPLATES.s1['恐慌中找强势']],
            s2Keys: [...RULE_TEMPLATES.s2['稳健型']],
            s3Keys: [...RULE_TEMPLATES.s3['保守套件']],
            params: { ...DEFAULT_PARAMS },
            ...overrides,
            params: { ...DEFAULT_PARAMS, ...(overrides.params || {}) }
        });

        const normalizeStrategy = (strategy, index = 0) => ({
            ...strategy,
            status: strategy.status || 'idle',
            config: createRuleConfig(strategy.config || (index === 1
                ? { globalTpl: '激进型', s1Tpl: '趋势突破', s2Tpl: '量价型', s3Tpl: '激进套件', s1Keys: [...RULE_TEMPLATES.s1['趋势突破']], s2Keys: [...RULE_TEMPLATES.s2['量价型']], s3Keys: [...RULE_TEMPLATES.s3['激进套件']] }
                : index === 2
                ? { globalTpl: '反转型', s1Tpl: '均值回归', s2Tpl: '反转型', s3Tpl: '保守套件', s1Keys: [...RULE_TEMPLATES.s1['均值回归']], s2Keys: [...RULE_TEMPLATES.s2['反转型']], s3Keys: [...RULE_TEMPLATES.s3['保守套件']] }
                : {}))
        });

        const formatToday = () => new Date().toISOString().split('T')[0];
        const parseReturn = (value) => Number(String(value || '0').replace('%', '').replace('+', '')) || 0;
        const formatReturn = (value) => `${value >= 0 ? '+' : ''}${value.toFixed(1)}%`;
        const cleanDisplayText = (value) => String(value || '')
            .replace(/\s*V1\.2/g, ' 第二版')
            .replace(/\s*V2\.0/g, ' 第二版')
            .replace(/\s*\(V1\.0\)/g, '')
            .replace(/\[L\d+:/g, '[')
            .replace(/L\d+:/g, '')
            .replace(/MACD/g, '趋势指标')
            .replace(/RSI/g, '超卖指标')
            .trim();
        const dataSourceName = (provider) => provider === 'tushare' ? 'Tushare 历史日线' : provider === 'akshare' ? 'AKShare 历史日线' : provider === 'baostock' ? 'BaoStock 历史日线备用' : provider === 'sina' ? '新浪行情兜底' : provider === 'mock' ? '样本数据' : provider === 'static' ? '收盘快照' : '本地引擎';

                    s2: { status: 'neutral', text: '待扫描' }
                },
                details: { s0: [], s1: [], s2: [] },
                signals: [],
                provider: apiStatus.provider
            };
            const staticData = isStaticDate ? {
                strategyName: staticScan.strategyName || '收盘扫描策略',
                funnel: staticScan.funnel,
                details: staticScan.details || { s0: [], s1: [], s2: [] },
                signals: staticScan.signals || [],
                provider: staticScan.provider,
                warnings: staticScan.warnings || [],
                runAt: staticScan.runAt,
                tradeDate: staticScan.tradeDate
            } : null;
            const awaitingLocalScan = apiStatus.status === 'online' && isLiveDate && !remoteData;
            const activeData = staticData || (isLiveDate && remoteData ? { ...remoteData, strategyName: appliedStrategy?.name || '无运行策略' } : awaitingLocalScan ? pendingScanData : localData);
            const signals = activeData.signals;
            const filteredSignals = signalBoardFilter === 'all' ? signals : signals.filter(row => stockBoardOf(row.id) === signalBoardFilter);
            const selectedBoardOption = STOCK_BOARD_OPTIONS.find(option => option.value === signalBoardFilter) || STOCK_BOARD_OPTIONS[0];
            const currentProvider = staticData?.provider || remoteData?.provider || apiStatus.provider || activeData?.provider || 'local';
            const dataSourceLabel = dataSourceName(currentProvider);
            const dataNoticeType = activeData?.provider === 'mock' || apiStatus.provider === 'local' ? 'warning' : 'neutral';
            const dataTierNotice = `${dataSourceTier(currentProvider)}。`;
            const providerOrderNotice = apiStatus.providerOrder?.length ? `数据源顺序：${apiStatus.providerOrder.map(dataSourceName).join(' -> ')}。` : '';
            const tushareNotice = apiStatus.configured?.tushare ? 'Tushare 已使用本地 token 配置。' : apiStatus.providerOrder?.includes('tushare') ? 'Tushare 未配置本地 token，已按顺序降级。' : '';
            const dataNotice = staticData
                ? (staticData.provider === 'mock'
                    ? `当前为收盘静态样本数据，最后生成时间 ${staticData.runAt || '--'}，适合验证 GitHub 半自动版流程。${dataTierNotice}`
                    : `当前为 ${staticData.tradeDate || '--'} 收盘后自动生成的观察清单，数据源：${dataSourceLabel}，最后更新时间 ${staticData.runAt || '--'}。${dataTierNotice}`)
                : remoteData?.provider === 'mock'
                ? `当前扫描已降级到样本数据，适合展示产品流程，不适合作为真实交易依据。${dataTierNotice}`
                : awaitingLocalScan
                ? `本地接口已连接，点击执行扫描后会按运行策略筛选股票。${dataTierNotice}${providerOrderNotice}${tushareNotice}`
                : remoteData
                ? `当前为 ${latestScanDate} 本地扫描结果，数据源：${dataSourceLabel}，请结合数据源状态理解扫描结果。${dataTierNotice}${providerOrderNotice}${tushareNotice}`
                : apiStatus.provider === 'local'
                ? `本地接口未连接，页面正在使用前端样本数据展示。${dataTierNotice}`
                : `当前页面用于策略流程演示，数据源：${dataSourceLabel}，请结合数据源状态理解扫描结果。${dataTierNotice}${providerOrderNotice}${tushareNotice}`;
            const scanDateLabel = remoteData ? '扫描日期' : awaitingLocalScan ? '扫描状态' : '演示日期';
            const scanDateValue = remoteData ? latestScanDate : awaitingLocalScan ? '待扫描' : currentDate;
            const scanDateTitle = remoteData ? '最新扫描日期' : awaitingLocalScan ? '尚未执行扫描' : '本地演示日期';
            const signalTitle = staticData ? '收盘观察信号' : remoteData && isLiveDate ? '本地扫描信号' : isLiveDate ? '今日买入信号' : '历史买入信号';
            const signalStatLabel = hasStaticScan ? "观察信号" : apiStatus.status === 'online' ? "扫描信号" : "买入信号";
            const scanButtonText = hasStaticScan ? '只读快照' : isScanning ? '扫描中' : '执行扫描';
            const scanButtonTitle = hasStaticScan ? 'GitHub Pages 只展示最近一次收盘快照，等待收盘自动更新' : canRunScan ? '按当前运行策略重新执行扫描' : !appliedStrategy ? '请先在策略页应用一个策略' : '本地接口未连接时使用演示数据';
            const scanButtonDisabled = hasStaticScan || isScanning;
            const activeScanButtonClass = "bg-blue-600 hover:bg-blue-500 text-white px-3 md:px-4 py-1.5 rounded-md flex items-center text-sm font-medium transition-colors";
            const readOnlyScanButtonClass = "bg-zinc-800/70 text-zinc-500 border border-zinc-700/60 cursor-not-allowed px-3 md:px-4 py-1.5 rounded-md flex items-center text-sm font-medium transition-colors";
            const scanButtonClass = hasStaticScan ? readOnlyScanButtonClass : `${activeScanButtonClass} ${isScanning ? 'opacity-50 cursor-not-allowed hover:bg-blue-600' : ''}`;

            useEffect(() => {
                if (staticDate) setCurrentDate(staticDate);
            }, [staticDate]);

            const handleRunScan = (options = {}) => {
                const shouldApply = options.shouldApply || (() => true);
                if (!canRunScan) {
                    if (!options.silent) {
                        const message = !appliedStrategy
                            ? '请先在策略页应用一个策略'
                            : hasStaticScan
                            ? '线上收盘快照不能在页面内执行扫描，请等待 Close Scan 更新'
                            : '本地接口未连接，当前使用演示数据';
                        onShowToast(message);
                    }
                    return Promise.resolve(false);
                }
                setIsScanning(true);
                return apiPost('/api/a/scan', {
                    config: appliedStrategy.config,
                    executedSignalIds,
                    positionIds: positions.map(p => p.id)
                }).then(data => {
                    if (!shouldApply()) return;
                    const scanDate = data.tradeDate || data.providerDate || localDemoDate;
                    const nextRemoteData = {
                        funnel: data.funnel,
                        details: data.details,
                        signals: data.signals || [],
                        provider: data.provider,
                        warnings: data.warnings || [],
                        providerDate: data.providerDate,
                        tradeDate: scanDate
                    };
                    setCurrentDate(scanDate);
                    setRemoteData(nextRemoteData);
                    saveScanRecord({
                        strategyId: appliedStrategy.id,
                        strategyName: appliedStrategy.name,
                        data: nextRemoteData
                    }).catch(error => console.warn('保存本地扫描结果失败', error));
                    const scanSignalCount = (data.signals || []).length;
                    if (!options.silent) onShowToast(`已按【${appliedStrategy.name}】完成扫描：${scanSignalCount} 只候选 (${dataSourceName(data.provider)})`);
                }).catch(() => {
                    if (!shouldApply()) return;
                    setRemoteData(null);
                    if (!options.silent) onShowToast('扫描失败，已回退到本地演示数据');
                }).finally(() => {
                    if (shouldApply()) setIsScanning(false);
                });
            };

            useEffect(() => {
                let cancelled = false;
                setIsScanning(false);
                if (hasStaticScan) return () => { cancelled = true; };
                if (apiStatus.status !== 'online' || !appliedStrategy?.id) {
                    setRemoteData(null);
                    setCurrentDate(localDemoDate);
                    return () => { cancelled = true; };
                }
                setRemoteData(null);
                setCurrentDate(localDemoDate);
                loadLatestScanRecord(appliedStrategy.id)
                    .then(record => {
                        if (cancelled || !record?.data) return;
                        setRemoteData(record.data);
                        setCurrentDate(record.data.tradeDate || record.data.providerDate || localDemoDate);
                    })
                    .catch(error => console.warn('读取本地扫描结果失败', error));
                return () => { cancelled = true; };
            }, [appliedStrategy?.id, apiStatus.status, hasStaticScan]);

            const toggleStep = (step) => setExpandedSteps(p => ({ ...p, [step]: !p[step] }));

            const handleBuy = (stock) => {
                if (!isLiveDate) return onShowToast(staticData ? '收盘快照为只读，只生成次日观察清单' : '历史复盘为只读，不能下单');
                if (positions.some(p => p.id === stock.id)) return onShowToast(`【${stock.name}】已在持仓中`);
                setExecutedSignalIds([...new Set([...executedSignalIds, stock.id])]);
                setPositions([{ id: stock.id, name: stock.name, entryDate: currentDate, entryPrice: '已委托', profit: '0.0%', status: 'normal', msg: '刚买入', strategyName: activeData.strategyName }, ...positions]);
                onShowToast(`已下达【${stock.name}】买入委托`);
            };

            const handleSell = (id, name) => {
                if (!canOperateHolding) return onShowToast('收盘快照为只读，不能离场');
                const target = positions.find(p => p.id === id);
                if (target) {
                    const newHistoryRec = {
                        id: 'tr_' + Date.now(),
                        code: target.id,
                        name: target.name,
                        entry: target.entryDate || '未知',
                        exit: holdingActionDate,
                        return: target.profit,
                        reason: '手动操作 (平仓/斩仓)',
                        status: target.status === 'danger' ? 'VIOLATION' : 'DISCIPLINE',
                        cost: target.status === 'danger' ? -500 : 0
                    };
                    setHistoryTrades([newHistoryRec, ...historyTrades]);
                }
                setPositions(positions.filter(p => p.id !== id));
                onShowToast(`已执行【${name}】离场并同步至历史`);
            };

            return (
                <PageShell>
                    <PageHeader
                        title={hasStaticScan ? "收盘策略复盘" : "策略监控台"}
                        subtitle={hasStaticScan ? "每天收盘后由自动任务生成观察清单，适合轻量复盘和截图展示。" : "基于历史日线和收盘数据执行扫描；每个交易日收盘后生成明日观察清单，不作为盘中实时买卖提醒。"}
                        actions={
                            <button onClick={() => handleRunScan()} disabled={scanButtonDisabled} aria-disabled={!canRunScan || scanButtonDisabled} title={scanButtonTitle} className={scanButtonClass}>
                                <Icons.Play size={14} className="mr-1" /> {scanButtonText}
                            </button>
                        }
                        stats={
                            <>
                                <StatBlock label="运行策略" value={cleanDisplayText(activeData.strategyName) || '未应用'} tone={activeData.strategyName !== "无运行策略" ? 'text-blue-400' : 'text-zinc-500'} />
                                <StatBlock label={signalStatLabel} value={`${signals.length} 只`} tone={signals.length ? 'text-green-400' : 'text-zinc-400'} helper={isLiveDate ? '今日候选' : '历史复盘'} />
                                <StatBlock label="模拟持仓" value={`${positions.length} 笔`} tone={positions.length ? 'text-blue-300' : 'text-zinc-400'} helper="当前持仓" />
                                <StatBlock label="市场开关" value={activeData.funnel.s0.text} tone={activeData.funnel.s0.status === 'pass' ? 'text-green-400' : 'text-red-400'} helper="大盘环境" />
                            </>
                        }
                    />

                    {showNotice && <NoticeStrip type={dataNoticeType} onDismiss={() => setShowNotice(false)}>{dataNotice}</NoticeStrip>}

                    <div className="flex-1 flex flex-col lg:flex-row gap-4 md:gap-6 overflow-visible min-h-min">
                        <Card
                            title={<><Icons.Activity className="mr-2 text-zinc-400" size={16}/>策略漏斗总览</>}
                            actions={
                                hasStaticScan ? (
                                    <div title="GitHub Pages 只展示最近一次收盘快照" className={`${META_PILL_CLASS} w-fit max-w-full`}>
                                        <Icons.Calendar size={13} className="text-zinc-400" />
                                        <span className={META_LABEL_CLASS}>观察日期</span>
                                        <span className={META_VALUE_CLASS}>{staticDate || '--'}</span>
                                    </div>
                                ) : (
                                    <div title={scanDateTitle} className={`${META_PILL_CLASS} w-fit max-w-full`}>
                                        <Icons.Calendar size={13} className="text-zinc-400" />
                                        <span className={META_LABEL_CLASS}>{scanDateLabel}</span>
                                        <span className={META_VALUE_CLASS}>{scanDateValue}</span>
                                    </div>
                                )
                            }
                            className="w-full lg:w-[360px] shrink-0 min-h-[350px]"
                            headerClass="px-4 py-3"
                            bodyClass="p-4 space-y-4"
                        >
                            <div className="flex items-center text-xs font-mono space-x-1.5 text-zinc-400 flex-wrap gap-y-2 mb-2">
                                <span>S0</span><Badge type={activeData.funnel.s0.status}>{activeData.funnel.s0.text}</Badge><Icons.ChevronRight size={12} className="text-zinc-600"/>
                                <span>S1</span><Badge type={activeData.funnel.s1.status}>{activeData.funnel.s1.text}</Badge><Icons.ChevronRight size={12} className="text-zinc-600"/>
                                <span>S2</span><Badge type={activeData.funnel.s2.status}>{activeData.funnel.s2.text}</Badge>
                            </div>
                            {['s0', 's1', 's2'].map((step, idx) => (
                            <div key={step} className="bg-[#111216] border border-zinc-800/60 rounded-lg overflow-hidden shrink-0">
                                <div className="flex items-center justify-between p-3 cursor-pointer hover:bg-zinc-800/50" onClick={() => toggleStep(step)}>
                                    <div className="flex items-center space-x-2 text-sm">
                                        {expandedSteps[step] ? <Icons.ChevronDown size={14} className="text-zinc-500"/> : <Icons.ChevronRight size={14} className="text-zinc-500"/>}
                                        <span className="font-mono text-zinc-300">{idx===0?'第 0 步：市场环境':idx===1?'第 1 步：发现阶段':'第 2 步：进场筛选'}</span>
                                    </div>
                                    <Badge type={activeData.funnel[step].status}>{activeData.funnel[step].text}</Badge>
                                </div>
                                {expandedSteps[step] && activeData.details[step].length > 0 && (
                                <div className="px-3 pb-3 pt-1 font-mono text-xs text-zinc-400 leading-6">
                                    {activeData.details[step].map((item, i, arr) => (
                                    <div key={i} className="flex flex-col sm:flex-row sm:justify-between hover:bg-zinc-800/30 px-2 rounded-md py-1">
                                        <div className="flex space-x-2"><span className="text-zinc-600 hidden sm:inline">{i === arr.length - 1 ? '└──' : '├──'}</span><span>{item.name} : <span className="text-zinc-500">{item.val}</span></span></div>
                                        <span className={`sm:text-right mt-1 sm:mt-0 ${item.status === '通过' ? 'text-green-500/80' : 'text-red-500/80'}`}>{item.status.includes('阻断') ? `[${item.status}]` : `[${item.status}]`}</span>
                                    </div>
                                    ))}
                                </div>
                                )}
                            </div>
                            ))}
                        </Card>

                        <div className="flex-1 flex flex-col gap-4 md:gap-6 min-w-0 pb-2">
                            <Card
                                title={<><Icons.Play className="mr-2 text-green-500" size={16}/>{signalTitle}<span className="ml-2 text-xs bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded-md">{signals.length}</span></>}
                                actions={
                                    <div className={BOARD_FILTER_GROUP_CLASS}>
                                        <div className={META_PILL_CLASS}>
                                            <span className={META_LABEL_CLASS}>当前显示</span>
                                            <span className={META_VALUE_CLASS}>{filteredSignals.length}</span>
                                        </div>
                                        <div
                                            className="relative"
                                            onBlur={(event) => {
                                                if (!event.currentTarget.contains(event.relatedTarget)) setIsBoardMenuOpen(false);
                                            }}
                                        >
                                            <button
                                                type="button"
                                                onClick={() => setIsBoardMenuOpen(value => !value)}
                                                aria-haspopup="listbox"
                                                aria-expanded={isBoardMenuOpen}
                                                className={`${META_PILL_CLASS} min-w-[132px] justify-between hover:border-zinc-700 hover:bg-zinc-900/80 transition-colors`}
                                            >
                                                <span className="inline-flex items-center gap-2 min-w-0">
                                                    <Icons.SlidersHorizontal size={13} className="text-zinc-500 shrink-0" />
                                                    <span className={META_LABEL_CLASS}>板块</span>
                                                    <span className={`${META_VALUE_CLASS} min-w-0 truncate`}>{selectedBoardOption.label}</span>
                                                </span>
                                                <Icons.ChevronDown size={13} className={`text-zinc-500 shrink-0 transition-transform ${isBoardMenuOpen ? 'rotate-180' : ''}`} />
                                            </button>
                                            {isBoardMenuOpen && (
                                                <div role="listbox" className={META_MENU_CLASS}>
                                                    {STOCK_BOARD_OPTIONS.map(option => {
                                                        const selected = option.value === signalBoardFilter;
                                                        return (
                                                            <button
                                                                key={option.value}
                                                                type="button"
                                                                role="option"
                                                                aria-selected={selected}
                                                                onMouseDown={(event) => event.preventDefault()}
                                                                onClick={() => {
                                                                    setSignalBoardFilter(option.value);
                                                                    setIsBoardMenuOpen(false);
                                                                }}
                                                                className={`w-full h-8 px-2.5 rounded-md flex items-center justify-between text-sm transition-colors ${selected ? 'bg-zinc-800 text-zinc-100' : 'text-zinc-400 hover:bg-zinc-800/70 hover:text-zinc-100'}`}
                                                            >
                                                                <span>{option.label}</span>
                                                                {selected && <Icons.CheckCircle2 size={13} className="text-green-400" />}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                }
                                className="min-h-[300px] flex flex-col shrink-0"
                                headerClass="px-4 py-3"
                                bodyClass="p-0 overflow-x-auto"
                            >
                                <table className="w-full text-sm text-left min-w-[500px]">
                                    <thead className="text-xs text-zinc-500 border-b border-zinc-800/60 sticky top-0 bg-[#16181D] z-10">
                                        <tr><th className="py-3 px-4 font-normal">代码</th><th className="py-3 px-4 font-normal">名称</th><th className="py-3 px-4 font-normal">命中原因</th><th className="py-3 px-4 font-normal text-right">操作</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-zinc-800/40 font-mono text-zinc-300">
                                        {filteredSignals.map(row => (
                                            <tr key={row.id} className="hover:bg-zinc-800/30 group">
                                            <td className="py-3 px-4 text-blue-400 cursor-pointer hover:underline" onClick={() => onOpenStockDetail({...row, code: row.id, strategyName: activeData.strategyName})}>{row.id}</td>
                                            <td className="py-3 px-4 text-zinc-200 font-sans">{row.name}</td><td className="py-3 px-4 text-zinc-400">{row.reason}</td>
                                            <td className="py-3 px-4 text-right"><button disabled={!isLiveDate} onClick={() => handleBuy(row)} className={`text-xs border px-3 py-1 rounded-md transition-colors ${isLiveDate ? 'bg-green-950 text-green-400 border-green-800/60 hover:bg-green-900' : 'bg-zinc-900 text-zinc-600 border-zinc-800 cursor-not-allowed'}`}>{isLiveDate ? '购买' : '只读'}</button></td>
                                            </tr>
                                        ))}
                                        {filteredSignals.length === 0 && <tr><td colSpan="4" className="text-center py-8 text-zinc-600">{awaitingLocalScan ? '尚未执行本地扫描' : signals.length > 0 ? '当前板块暂无符合条件标的' : remoteData ? '本次扫描未发现符合条件标的' : '暂无信号'}</td></tr>}
                                    </tbody>
                                </table>
                            </Card>

                            <Card title={<><Icons.Briefcase className="mr-2 text-blue-500" size={16}/>当前持仓风控<span className="ml-2 text-xs bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded-md">{positions.length}</span></>} className="min-h-[300px] flex flex-col shrink-0" headerClass="px-4 py-3" bodyClass="p-0 overflow-x-auto">
                                <table className="w-full text-sm text-left min-w-[600px]">
                                    <thead className="text-xs text-zinc-500 border-b border-zinc-800/60 sticky top-0 bg-[#16181D] z-10">
                                        <tr><th className="py-3 px-4 font-normal">代码</th><th className="py-3 px-4 font-normal font-sans">名称</th><th className="py-3 px-4 font-normal">浮动盈亏</th><th className="py-3 px-4 font-normal font-sans">离场信号/锁定</th><th className="py-3 px-4 font-normal text-right font-sans">操作</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-zinc-800/40 font-mono text-zinc-300">
                                        {positions.map(row => {
                                        let rowStyle = "hover:bg-zinc-800/30"; let profitStyle = row.profit.startsWith('+') ? "text-green-500" : (row.profit.startsWith('-') ? "text-red-500" : "text-zinc-400");
                                        let msgStyle = "text-zinc-500 font-sans text-xs"; let btn = <span className="text-zinc-600">--</span>;
                                        if (row.status === 'warning') {
                                            rowStyle = "bg-yellow-950/20 hover:bg-yellow-950/30"; msgStyle = "text-yellow-500 font-sans text-xs font-medium";
                                            btn = <button disabled={!canOperateHolding} onClick={()=>handleSell(row.id, row.name)} className={`text-xs border px-3 py-1 rounded-md ${canOperateHolding ? 'bg-yellow-900/60 text-yellow-400 border-yellow-700/60' : 'bg-zinc-900 text-zinc-600 border-zinc-800 cursor-not-allowed'}`}>{canOperateHolding ? '离场' : '只读'}</button>;
                                        } else if (row.status === 'danger') {
                                            rowStyle = "bg-red-950/20 hover:bg-red-950/30"; msgStyle = "text-red-400 font-sans text-xs font-bold";
                                            btn = <button disabled={!canOperateHolding} onClick={()=>handleSell(row.id, row.name)} className={`text-xs border px-3 py-1 rounded-md ${canOperateHolding ? 'bg-red-900/80 text-white border-red-700' : 'bg-zinc-900 text-zinc-600 border-zinc-800 cursor-not-allowed'}`}>{canOperateHolding ? '斩仓' : '只读'}</button>;
                                        }
                                        return (
                                            <tr key={row.id} className={`${rowStyle} transition-colors group`}>
                                            <td className="py-3 px-4 text-blue-400 cursor-pointer hover:underline" onClick={() => onOpenStockDetail({...row, code: row.id, strategyName: activeData.strategyName, reason: row.msg})} >{row.id}</td>
                                            <td className="py-3 px-4 text-zinc-200 font-sans">{row.name}</td><td className={`py-3 px-4 ${profitStyle}`}>{row.profit}</td>
                                            <td className="py-3 px-4 flex items-center space-x-1.5">{row.status === 'danger' && <Icons.AlertTriangle size={14} className="text-red-500 shrink-0" />}<span className={msgStyle}>{cleanDisplayText(row.msg)}</span></td>
                                            <td className="py-3 px-4 text-right">{btn}</td>
                                            </tr>
                                        )
                                        })}
                                        {positions.length === 0 && <tr><td colSpan="5" className="text-center py-8 text-zinc-600">暂无持仓 (数据已同步保存)</td></tr>}
                                    </tbody>
                                </table>
                            </Card>
                        </div>
                    </div>
                </PageShell>
            );
        };

        // ==========================================
        // 子视图：2. 策略页 (Strategy)
        // ==========================================
        const ViewStrategy = ({ strategies, setStrategies, appliedId, setAppliedId, onShowToast }) => {
            const [activeCardId, setActiveCardId] = useStickyState(appliedId || strategies[0]?.id || null, 'lq_activeStrategyCardId');
            const hasActiveStrategy = strategies.some(s => s.id === activeCardId);
            const activeStrategy = strategies.find(s => s.id === activeCardId) || strategies.find(s => s.id === appliedId) || strategies[0];
            const strategyIdsKey = strategies.map(s => s.id).join(',');

            useEffect(() => {
                if (hasActiveStrategy) return;
                const fallbackId = appliedId && strategies.some(s => s.id === appliedId) ? appliedId : strategies[0]?.id || null;
                if (activeCardId !== fallbackId) setActiveCardId(fallbackId);
            }, [hasActiveStrategy, activeCardId, appliedId, strategyIdsKey]);

            const handleCreateStrategy = () => {
                const newStrategy = {
                    id: 'str_' + Date.now(),
                    name: '新建自定义策略',
                    status: 'idle',
                    source: '手动创建',
                    updatedAt: new Date().toISOString().split('T')[0],
                    description: '新建的自定义策略，请配置下方的规则与参数。',
                    config: createRuleConfig({ globalTpl: '自定义' })
                };
                setStrategies([newStrategy, ...strategies]);
                setActiveCardId(newStrategy.id);
            };

            const handleNameChange = (e) => {
                const newName = e.target.value;
                setStrategies(strategies.map(s => s.id === activeCardId ? { ...s, name: newName } : s));
            };

            const handleDeleteStrategy = (e, id, name) => {
                e.stopPropagation();
                if(!confirm(`确定删除策略【${name}】吗？`)) return;
                const newStrategies = strategies.filter(s => s.id !== id);
                setStrategies(newStrategies);
                if (activeCardId === id) setActiveCardId(newStrategies[0]?.id || null);
                if (appliedId === id) setAppliedId(null);
                onShowToast(`策略【${name}】已删除`);
            };

            const updateActiveStrategy = (patch) => {
                setStrategies(strategies.map(s => s.id === activeCardId ? normalizeStrategy({ ...s, ...patch, updatedAt: formatToday() }) : s));
            };

            const handleConfigChange = (nextConfig) => {
                updateActiveStrategy({ config: nextConfig, description: strategyRuleSummary(nextConfig) });
            };

            const handleApply = () => {
                setActiveCardId(activeStrategy.id);
                setAppliedId(activeStrategy.id);
                setStrategies(strategies.map(s => ({ ...s, status: s.id === activeStrategy.id ? 'applied' : 'idle' })));
                onShowToast(`已应用【${activeStrategy.name}】`);
            };

            const handleCancelApply = () => {
                setAppliedId(null);
                setStrategies(strategies.map(s => ({ ...s, status: 'idle' })));
                onShowToast('已取消当前运行策略');
            };

            return (
                <PageShell>
                    <PageHeader
                        title="策略规则配置"
                        subtitle="把发现信号、入场确认和离场纪律拆成可调规则，方便对比不同策略套件。"
                        stats={
                            <>
                                <StatBlock label="策略数量" value={`${strategies.length} 套`} tone="text-zinc-100" helper="策略库" />
                                <StatBlock label="运行状态" value={activeStrategy?.id === appliedId ? '运行中' : '未应用'} tone={activeStrategy?.id === appliedId ? 'text-green-400' : 'text-zinc-400'} helper={cleanDisplayText(activeStrategy?.name) || '无'} />
                                <StatBlock label="规则数量" value={activeStrategy?.config ? `${countSelectedRules(activeStrategy.config)} 条` : '0 条'} tone="text-blue-300" helper="当前选中" />
                                <StatBlock label="更新时间" value={activeStrategy?.updatedAt || '--'} tone="text-zinc-300" helper="最后更新" />
                            </>
                        }
                    />
                    <div className="flex-1 flex flex-col md:flex-row gap-4 md:gap-6 overflow-visible w-full min-h-min">
                    <Card
                        title={<><Icons.FileText className="mr-2 text-zinc-400" size={16}/>策略库</>}
                        actions={<button onClick={handleCreateStrategy} className="text-zinc-400 hover:text-zinc-200 transition-colors bg-zinc-800/50 hover:bg-zinc-800 p-1 rounded-md"><Icons.Plus size={16} /></button>}
                        className="w-full md:w-80 shrink-0 h-[350px] md:h-fit"
                        headerClass="px-6 py-3"
                        bodyClass="p-3 space-y-3 overflow-y-auto"
                    >
                        {strategies.length === 0 && <div className="text-zinc-600 text-center text-sm py-4">策略库为空，请新建</div>}
                        {strategies.map(s => {
                            const isSelected = s.id === activeCardId;
                            const isApplied = s.id === appliedId;
                            return (
                            <div key={s.id} onClick={() => setActiveCardId(s.id)}
                                className={`p-3 rounded-lg cursor-pointer border transition-all group ${isSelected ? 'bg-zinc-800/80 border-zinc-500' : 'bg-[#111216] border-zinc-800/50 hover:border-zinc-700'}`}>
                                <div className="flex justify-between items-start mb-2">
                                    <div className="font-bold text-sm text-zinc-200 truncate pr-2">{cleanDisplayText(s.name)}</div>
                                    <button onClick={(e) => handleDeleteStrategy(e, s.id, s.name)} className="text-zinc-500 hover:text-red-400 transition-colors p-0.5 -mt-0.5 -mr-0.5"><Icons.Trash2 size={14}/></button>
                                </div>
                                <div className="text-xs text-zinc-500 truncate mb-2">{cleanDisplayText(s.description)}</div>
                                <div className="text-[10px] text-zinc-600 truncate mb-2 font-mono">{s.config ? strategyRuleSummary(s.config) : '未配置规则'}</div>
                                <div className="flex justify-between items-center text-xs font-mono">
                                    <span className="text-zinc-500">{s.updatedAt}</span>
                                    {isApplied ? <span className="text-green-400 flex items-center"><Icons.CheckCircle2 size={12} className="mr-1"/> 应用中</span> : <span className="text-zinc-600">未应用</span>}
                                </div>
                            </div>
                            );
                        })}
                    </Card>

                    <Card
                        className="flex-1 min-w-0"
                        headerClass="px-4 md:px-8 py-3"
                        bodyClass="p-4 md:p-8"
                        title={
                            activeStrategy ? (
                                <div className="flex flex-col py-1">
                                    <input type="text" value={cleanDisplayText(activeStrategy.name)} onChange={handleNameChange} placeholder="请输入策略名称"
                                        className="text-lg md:text-xl font-bold text-zinc-100 bg-transparent hover:bg-zinc-800/50 focus:bg-[#111216] focus:ring-1 focus:ring-zinc-700 outline-none rounded-md px-2 -ml-2 transition-colors w-[200px] md:w-[400px]" />
                                    <p className="text-[10px] font-mono text-zinc-500 ml-1 mt-0.5">来源: {activeStrategy.source} | 最后更新: {activeStrategy.updatedAt}</p>
                                </div>
                            ) : "未选择策略"
                        }
                        actions={
                            activeStrategy && (
                                <div className="flex space-x-3 shrink-0">
                                    <button onClick={() => onShowToast('配置已保存到策略库')} className="px-3 md:px-4 py-1.5 rounded-md border border-zinc-700 text-zinc-300 text-sm font-medium hover:bg-zinc-800 transition-colors flex items-center whitespace-nowrap">
                                        <Icons.Save size={14} className="mr-2"/> 保存
                                    </button>
                                    {appliedId === activeStrategy.id ? (
                                        <button onClick={handleCancelApply} className="px-3 md:px-4 py-1.5 rounded-md bg-zinc-800 text-red-400 text-sm font-medium hover:bg-zinc-700 transition-colors flex items-center border border-zinc-700 whitespace-nowrap">
                                        <Icons.XCircle size={14} className="mr-2"/> 取消应用
                                        </button>
                                    ) : (
                                        <button onClick={handleApply} className="px-3 md:px-4 py-1.5 rounded-md bg-green-700 text-white text-sm font-medium hover:bg-green-600 transition-colors flex items-center whitespace-nowrap">
                                        <Icons.Zap size={14} className="mr-2"/> 立即应用
                                        </button>
                                    )}
                                </div>
                            )
                        }
                    >
                        {activeStrategy ? <RuleConfigurator config={activeStrategy.config} onChange={handleConfigChange} /> : <div className="flex h-full items-center justify-center text-zinc-600 font-mono">请在左侧选择或新建一个策略</div>}
                    </Card>
                    </div>
                </PageShell>
            );
        }

        // ==========================================
        // 子视图：3. 历史复盘页 (History)
        // ==========================================
        const ViewHistory = ({ historyTrades, setHistoryTrades, onShowToast, onOpenStockDetail }) => {
            const [showNotice, setShowNotice] = useState(true);
            const totalReturn = historyTrades.reduce((sum, tr) => sum + parseReturn(tr.return), 0);
            const wins = historyTrades.filter(tr => parseReturn(tr.return) > 0).length;
            const disciplined = historyTrades.filter(tr => tr.status === 'DISCIPLINE').length;
            const cost = historyTrades.reduce((sum, tr) => sum + Number(tr.cost || 0), 0);
            const winRate = historyTrades.length ? `${((wins / historyTrades.length) * 100).toFixed(1)}%` : '0.0%';
            const disciplineRate = historyTrades.length ? `${((disciplined / historyTrades.length) * 100).toFixed(1)}%` : '0.0%';
            const handleClearHistory = () => {
                if (!historyTrades.length) return;
                if (!confirm('确定清空全部历史交易记录吗？此操作只会清除本浏览器里的模拟交易历史，无法撤回。')) return;
                setHistoryTrades([]);
                onShowToast('历史交易记录已清空');
            };
            return (
            <PageShell>
                <PageHeader
                    title="历史交易复盘"
                    subtitle="把收益、胜率和纪律执行放在同一张截图里，突出这套工具的复盘价值。"
                    stats={
                        <>
                            <StatBlock label="总收益" value={formatReturn(totalReturn)} tone={totalReturn >= 0 ? 'text-green-400' : 'text-red-400'} helper="系统总收益" />
                            <StatBlock label="胜率" value={winRate} tone="text-zinc-100" helper="策略胜率" />
                            <StatBlock label="纪律执行" value={disciplineRate} tone="text-blue-300" helper="纪律执行率" />
                            <StatBlock label="违规成本" value={`￥${cost.toLocaleString()}`} tone="text-red-400" helper="累计违规成本" />
                        </>
                    }
                />
                {showNotice && <NoticeStrip type="neutral" onDismiss={() => setShowNotice(false)}>历史记录来自本地模拟交易，用于复盘规则执行过程；截图发布时建议保留“原型演示”语境。</NoticeStrip>}

                <Card
                    title="历史交易明细库"
                    actions={
                        <button
                            onClick={handleClearHistory}
                            disabled={!historyTrades.length}
                            title={historyTrades.length ? '清空历史交易记录' : '暂无历史交易记录'}
                            aria-label="清空历史交易记录"
                            className={`h-8 inline-flex items-center justify-center gap-1.5 rounded-md border px-2.5 text-xs transition-colors ${historyTrades.length ? 'border-red-900/70 bg-[#111216] text-red-400 hover:bg-red-950/30' : 'border-zinc-800 bg-[#111216] text-zinc-600 cursor-not-allowed'}`}
                        >
                            <Icons.Trash2 size={14} />
                            <span>清空记录</span>
                        </button>
                    }
                    className="flex-1"
                    headerClass="px-6 py-3"
                    bodyClass="p-0 overflow-x-auto"
                >
                    <table className="w-full text-sm text-left min-w-[700px]">
                        <thead className="text-xs text-zinc-500 border-b border-zinc-800/60 sticky top-0 bg-[#16181D] z-10">
                            <tr><th className="py-3 px-6 font-normal">代码名称</th><th className="py-3 px-6 font-normal">入场 / 离场日期</th><th className="py-3 px-6 font-normal">最终收益</th><th className="py-3 px-6 font-normal">离场原因</th><th className="py-3 px-6 font-normal text-right">纪律状态</th></tr>
                        </thead>
                        <tbody className="divide-y divide-zinc-800/40 font-mono text-zinc-300">
                            {historyTrades.map(tr => (
                            <tr key={tr.id} className="hover:bg-zinc-800/30 transition-colors">
                                <td className="py-3 px-6"><div className="text-blue-400 cursor-pointer hover:underline" onClick={() => onOpenStockDetail({code: tr.code, name: tr.name, reason: tr.reason, return: tr.return, entryDate: tr.entry})}>{tr.code}</div><div className="text-xs text-zinc-500 font-sans">{tr.name}</div></td>
                                <td className="py-3 px-6 text-zinc-400 flex items-center mt-2">{tr.entry} <Icons.ArrowRight size={12} className="mx-2 text-zinc-600"/> {tr.exit}</td>
                                <td className={`py-3 px-6 text-lg font-bold ${tr.return.startsWith('+') ? 'text-green-500' : 'text-red-500'}`}>{tr.return}</td>
                                <td className="py-3 px-6 text-zinc-400 text-xs">{cleanDisplayText(tr.reason)}</td>
                                <td className="py-3 px-6 text-right">
                                {tr.status === 'DISCIPLINE' ? <Badge type="pass">纪律离场</Badge> : <div className="flex flex-col items-end"><Badge type="fail">违规离场</Badge><span className="text-[10px] text-red-500/80 mt-1">成本: {tr.cost}元</span></div>}
                                </td>
                            </tr>
                            ))}
                            {historyTrades.length === 0 && <tr><td colSpan="5" className="text-center py-12 text-zinc-600">暂无历史交易记录</td></tr>}
                        </tbody>
                    </table>
                </Card>
            </PageShell>
            );
        };

        // ==========================================
        // 子视图：4. 回测页 (Backtest)
        // ==========================================
        const ViewBacktest = ({ strategies, setStrategies, backtests, setBacktests, apiStatus, onShowToast }) => {
            const [detailId, setDetailId] = useState(null);
            const [isCreating, setIsCreating] = useState(false);
            const [showNotice, setShowNotice] = useState(true);
            const [draft, setDraft] = useState({ name: '未命名回测 202605', range: '2025-01-01 ~ 2026-01-01', capital: '100000', config: createRuleConfig() });

            const handleImport = (bt) => {
                const newStrategy = {
                    id: 'str_' + Date.now(),
                    name: bt.name + ' (回测导入)', status: 'idle', source: '回测导入',
                    updatedAt: new Date().toISOString().split('T')[0],
                    description: `这是从历史回测任务 [${bt.name}] 中导入的策略配置。`,
                    config: createRuleConfig(bt.config || {})
                };
                setStrategies([newStrategy, ...strategies]);
                setBacktests(backtests.map(item => item.id === bt.id ? { ...item, synced: true, strategyId: newStrategy.id } : item));
                onShowToast(`已成功将【${bt.name}】导入至策略库`);
            };

            const handleStartBacktest = () => {
                if (!draft.name.trim()) return onShowToast('请输入回测名称');
                if (apiStatus.status === 'online') {
                    apiPost('/api/a/backtest', { config: draft.config, name: draft.name.trim(), range: draft.range })
                        .then(data => {
                            const newBt = data.backtest;
                            setBacktests([newBt, ...backtests]);
                            setDetailId(newBt.id);
                            setIsCreating(false);
                            onShowToast(`回测【${newBt.name}】已完成 (${dataSourceName(data.provider)})`);
                        })
                        .catch(() => {
                            const newBt = runBacktest(draft.config, draft.name.trim(), draft.range);
                            setBacktests([newBt, ...backtests]);
                            setDetailId(newBt.id);
                            setIsCreating(false);
                            onShowToast(`回测【${newBt.name}】已完成 (本地引擎)`);
                        });
                    return;
                }
                const newBt = runBacktest(draft.config, draft.name.trim(), draft.range);
                setBacktests([newBt, ...backtests]);
                setDetailId(newBt.id);
                setIsCreating(false);
                onShowToast(`回测【${newBt.name}】已完成 (本地引擎)`);
            };

            const handleDelete = (id, name) => {
                if(confirm(`确定删除回测记录【${name}】吗？`)){
                    setBacktests(backtests.filter(b => b.id !== id));
                    onShowToast(`回测记录【${name}】已删除`);
                }
            };

            if (isCreating) {
                return (
                <PageShell>
                    <PageHeader
                        eyebrow="新建回测"
                        title="新建历史回测"
                        subtitle="选择规则参数后启动本地引擎，当前结果用于流程演示和策略配置沉淀。"
                        actions={
                            <>
                                <button onClick={() => setIsCreating(false)} className="text-zinc-400 hover:text-zinc-200 flex items-center text-sm font-medium transition-colors">
                                    <Icons.ArrowRight className="mr-1 rotate-180" size={14} /> 取消
                                </button>
                                <button onClick={handleStartBacktest} className="px-4 py-1.5 rounded-md bg-blue-700 text-white font-medium hover:bg-blue-600 transition-colors flex items-center text-sm">
                                    启动引擎
                                </button>
                            </>
                        }
                    />
                    <Card
                        className="flex-1"
                        title={<div className="flex items-center text-lg text-zinc-100"><Icons.Play size={18} className="mr-2 text-blue-500"/>回测参数</div>}
                    >
                        <div className="mb-6 flex flex-wrap gap-6 items-center font-mono text-sm bg-[#111216] p-4 rounded-lg border border-zinc-800/50">
                            <div className="flex flex-col"><span className="text-zinc-500 text-xs mb-1">回测名称</span><input type="text" value={draft.name} onChange={(e)=>setDraft({...draft, name: e.target.value})} className="bg-zinc-900 border border-zinc-700 rounded-md px-3 py-1.5 text-zinc-200 outline-none focus:border-blue-500 w-48"/></div>
                            <div className="flex flex-col"><span className="text-zinc-500 text-xs mb-1">回测区间</span><input type="text" value={draft.range} onChange={(e)=>setDraft({...draft, range: e.target.value})} className="bg-zinc-900 border border-zinc-700 rounded-md px-3 py-1.5 text-zinc-200 outline-none focus:border-blue-500 w-56"/></div>
                            <div className="flex flex-col"><span className="text-zinc-500 text-xs mb-1">初始资金</span><input type="number" value={draft.capital} onChange={(e)=>setDraft({...draft, capital: e.target.value})} className="bg-zinc-900 border border-zinc-700 rounded-md px-3 py-1.5 text-zinc-200 outline-none focus:border-blue-500 w-32"/></div>
                        </div>
                        <RuleConfigurator config={draft.config} onChange={(config)=>setDraft({...draft, config})} />
                    </Card>
                </PageShell>
                );
            }

            if (detailId) {
                const bt = backtests.find(b => b.id === detailId);
                if (!bt) return null;
                const details = MOCK_DB.backtestDetails[detailId] || buildBacktestDetails(bt);
                return (
                <PageShell>
                    <PageHeader
                        eyebrow="回测结果"
                        title={`回测详情：${bt.name}`}
                        subtitle={`测试区间：${bt.range}。当前回测结果用于验证策略流程和展示配置沉淀。`}
                        actions={<button onClick={() => setDetailId(null)} className="text-zinc-400 hover:text-zinc-200 flex items-center text-sm font-medium transition-colors"><Icons.ArrowRight className="mr-1 rotate-180" size={14} /> 返回列表</button>}
                        stats={
                            <>
                                <StatBlock label="总收益" value={details.summary.return} tone={details.summary.return.startsWith('+') ? 'text-green-400' : 'text-red-400'} helper="回测收益" />
                                <StatBlock label="夏普比率" value={details.summary.sharpe} tone="text-zinc-100" helper="收益波动比" />
                                <StatBlock label="最大回撤" value={details.summary.maxDrawdown} tone="text-red-400" helper="最大亏损区间" />
                                <StatBlock label="交易笔数" value={`${details.summary.trades} 笔`} tone="text-blue-300" helper={`胜率 ${details.summary.winRate}`} />
                            </>
                        }
                    />
                    <Card
                        title="回测明细"
                        className="flex-1" bodyClass="p-4 md:p-6 flex flex-col gap-6"
                    >
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-4 shrink-0">
                            <div className="bg-[#111216] border border-zinc-800/60 rounded-lg p-4"><div className="text-zinc-500 text-xs font-mono mb-1">总收益</div><div className="text-xl font-bold text-green-500">{details.summary.return}</div></div>
                            <div className="bg-[#111216] border border-zinc-800/60 rounded-lg p-4"><div className="text-zinc-500 text-xs font-mono mb-1">夏普比率</div><div className="text-xl font-bold text-zinc-200">{details.summary.sharpe}</div></div>
                            <div className="bg-[#111216] border border-zinc-800/60 rounded-lg p-4"><div className="text-zinc-500 text-xs font-mono mb-1">最大回撤</div><div className="text-xl font-bold text-red-500">{details.summary.maxDrawdown}</div></div>
                            <div className="bg-[#111216] border border-zinc-800/60 rounded-lg p-4"><div className="text-zinc-500 text-xs font-mono mb-1">胜率</div><div className="text-xl font-bold text-blue-400">{details.summary.winRate}</div></div>
                            <div className="bg-[#111216] border border-zinc-800/60 rounded-lg p-4"><div className="text-zinc-500 text-xs font-mono mb-1">交易笔数</div><div className="text-xl font-bold text-zinc-200">{details.summary.trades} 笔</div></div>
                        </div>
                        <div className="bg-[#111216] border border-zinc-800/60 rounded-lg p-6 flex items-center justify-center text-zinc-600 font-mono h-48 shadow-inner shrink-0">
                            [ 图表占位：此处渲染 ECharts 净值曲线与基准对比图 ]
                        </div>
                        <div className="flex-1 border border-zinc-800/60 rounded-lg overflow-hidden flex flex-col min-h-[300px]">
                            <div className="h-10 px-4 border-b border-zinc-800/60 flex items-center bg-[#111216] shrink-0"><h3 className="text-sm font-bold text-zinc-300">交易明细快照</h3></div>
                            <div className="flex-1 overflow-auto">
                                <table className="w-full text-sm text-left min-w-[600px]">
                                <thead className="text-xs text-zinc-500 border-b border-zinc-800/60 sticky top-0 bg-[#16181D] z-10">
                                    <tr><th className="py-3 px-4 font-normal">代码名称</th><th className="py-3 px-4 font-normal">入场时间/价格</th><th className="py-3 px-4 font-normal">离场时间/价格</th><th className="py-3 px-4 font-normal">收益率</th><th className="py-3 px-4 font-normal text-right">离场原因</th></tr>
                                </thead>
                                <tbody className="divide-y divide-zinc-800/40 font-mono text-zinc-300">
                                    {details.trades.map(t => (
                                    <tr key={t.id} className="hover:bg-zinc-800/30 transition-colors">
                                        <td className="py-3 px-4"><div className="text-blue-400">{t.code}</div><div className="text-xs text-zinc-500 font-sans">{t.name}</div></td>
                                        <td className="py-3 px-4 text-zinc-400">{t.entry} <br/> <span className="text-zinc-300">￥{t.entryPrice}</span></td>
                                        <td className="py-3 px-4 text-zinc-400">{t.exit} <br/> <span className="text-zinc-300">￥{t.exitPrice}</span></td>
                                        <td className={`py-3 px-4 font-bold ${t.return.startsWith('+') ? 'text-green-500' : 'text-red-500'}`}>{t.return}</td>
                                        <td className="py-3 px-4 text-right text-xs text-zinc-400">{t.reason}</td>
                                    </tr>
                                    ))}
                                    {details.trades.length === 0 && <tr><td colSpan="5" className="text-center py-12 text-zinc-600">当前规则在样本区间内没有产生交易</td></tr>}
                                </tbody>
                                </table>
                            </div>
                        </div>
                    </Card>
                </PageShell>
                );
            }

            return (
                <PageShell>
                    <PageHeader
                        title="回测任务大厅"
                        subtitle="集中展示回测记录、同步状态和策略导入入口，适合截取为项目能力总览。"
                        actions={<button onClick={() => setIsCreating(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-3 md:px-4 py-1.5 rounded-md flex items-center text-sm font-medium transition-colors"><Icons.Plus size={14} className="mr-1" /> 新建回测</button>}
                        stats={
                            <>
                                <StatBlock label="回测任务" value={`${backtests.length} 个`} tone="text-zinc-100" helper="回测记录" />
                                <StatBlock label="已导入" value={`${backtests.filter(bt => bt.synced).length} 个`} tone="text-green-400" helper="已导入策略库" />
                                <StatBlock label="最高收益" value={backtests[0]?.return || '--'} tone={backtests[0]?.return?.startsWith('+') ? 'text-green-400' : 'text-zinc-400'} helper="列表首项" />
                                <StatBlock label="引擎状态" value={apiStatus.label} tone={apiStatus.status === 'online' ? 'text-blue-300' : 'text-zinc-400'} helper="本地状态" />
                            </>
                        }
                    />
                    {showNotice && <NoticeStrip type="warning" onDismiss={() => setShowNotice(false)}>当前回测用于原型演示，尚未覆盖滑点、手续费、停牌、涨跌停和严格逐日持仓逻辑。</NoticeStrip>}
                    <Card
                        title={<><Icons.Activity className="mr-2 text-blue-500" size={16}/>回测记录</>}
                        className="flex-1" headerClass="px-4 py-3" bodyClass="p-0 overflow-x-auto"
                    >
                        <table className="w-full text-sm text-left min-w-[700px]">
                        <thead className="text-xs text-zinc-500 border-b border-zinc-800/60 sticky top-0 bg-[#16181D] z-10">
                            <tr><th className="py-3 px-4 font-normal">回测名称</th><th className="py-3 px-4 font-normal">测试区间</th><th className="py-3 px-4 font-normal">总收益</th><th className="py-3 px-4 font-normal">胜率</th><th className="py-3 px-4 font-normal">同步</th><th className="py-3 px-4 font-normal text-right">操作</th></tr>
                        </thead>
                        <tbody className="divide-y divide-zinc-800/40 font-mono text-zinc-300">
                            {backtests.map(bt => (
                            <tr key={bt.id} className="hover:bg-zinc-800/30 transition-colors group">
                                <td className="py-3 px-4 font-sans text-zinc-200">{bt.name}</td>
                                <td className="py-3 px-4 text-zinc-400">{bt.range}</td>
                                <td className={`py-3 px-4 font-bold ${bt.return.startsWith('+') ? 'text-green-500' : 'text-red-500'}`}>{bt.return}</td>
                                <td className="py-3 px-4 text-blue-400">{bt.winRate}</td>
                                <td className="py-3 px-4">{bt.synced ? <Badge type="pass">已导入</Badge> : <Badge type="neutral">未导入</Badge>}</td>
                                <td className="py-3 px-4 text-right">
                                    <div className="flex items-center justify-end gap-1.5">
                                        <button
                                            onClick={() => setDetailId(bt.id)}
                                            title="查看详情"
                                            aria-label={`查看${bt.name}详情`}
                                            className="h-8 w-8 inline-flex items-center justify-center rounded-md border border-zinc-800 bg-[#111216] text-zinc-500 hover:text-zinc-200 hover:border-zinc-600 hover:bg-zinc-800/60 transition-colors"
                                        >
                                            <Icons.FileText size={14} />
                                        </button>
                                        <button
                                            onClick={() => handleImport(bt)}
                                            title={bt.synced ? '再次导入策略' : '导入策略'}
                                            aria-label={`${bt.synced ? '再次导入' : '导入'}${bt.name}到策略库`}
                                            className="h-8 w-8 inline-flex items-center justify-center rounded-md border border-zinc-800 bg-[#111216] text-zinc-500 hover:text-blue-300 hover:border-blue-800/70 hover:bg-blue-950/30 transition-colors"
                                        >
                                            <Icons.ArrowRight size={14} />
                                        </button>
                                        <button
                                            onClick={() => handleDelete(bt.id, bt.name)}
                                            title="删除记录"
                                            aria-label={`删除${bt.name}`}
                                            className="h-8 w-8 inline-flex items-center justify-center rounded-md border border-zinc-800 bg-[#111216] text-zinc-500 hover:text-red-400 hover:border-red-900/70 hover:bg-red-950/30 transition-colors"
                                        >
                                            <Icons.Trash2 size={14} />
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            ))}
                            {backtests.length === 0 && <tr><td colSpan="6" className="text-center py-12 text-zinc-600">暂无回测记录</td></tr>}
                        </tbody>
                        </table>
                    </Card>
                </PageShell>
            );
        };

        // ==========================================
        // 主入口组件
        // ==========================================
        function App() {
            // 顺序要求：监控、历史、策略、回测
            const initialTab = (() => {
                const tab = new URLSearchParams(window.location.search).get('tab');
                return ['监控', '历史', '策略', '回测'].includes(tab) ? tab : '监控';
            })();
            const [activeTab, setActiveTab] = useStickyState(initialTab, 'lq_activeTab');

            const [strategies, setStrategies] = useStickyState(MOCK_DB.strategies, 'lq_strategies');
            const [backtests, setBacktests] = useStickyState(MOCK_DB.backtests, 'lq_backtests');
            const [positions, setPositions] = useStickyState(MOCK_DB.monitorPositions, 'lq_positions');
            const [historyTrades, setHistoryTrades] = useStickyState(MOCK_DB.historyTrades, 'lq_history');
            const [appliedStrategyId, setAppliedStrategyId] = useStickyState(MOCK_DB.strategies[0]?.id, 'lq_appliedId');
            const [executedSignalIds, setExecutedSignalIds] = useStickyState([], 'lq_executedSignals');

            const [toast, setToast] = useState('');
            const toastTimerRef = useRef(null);
            const [selectedStock, setSelectedStock] = useState(null); // { code, name, strategyName, reason... }
            const [apiStatus, setApiStatus] = useState({ status: 'offline', label: '本地引擎', provider: 'local' });
            const [staticScan, setStaticScan] = useState(null);

            const normalizedStrategies = strategies.map(normalizeStrategy);
            const appliedStrategy = normalizedStrategies.find(s => s.id === appliedStrategyId) || null;

            useEffect(() => {
                let cancelled = false;
                fetchJson('/api/health')
                    .then(data => {
                        if (cancelled) return;
                        setStaticScan(null);
                        setApiStatus({ status: 'online', label: dataSourceName(data.provider), provider: data.provider, warnings: data.warnings || [], providerOrder: data.providerOrder || [], configured: data.configured || {} });
                    })
                    .catch(() => {
                        Promise.all([
                            fetchJson('public-data/run-status.json'),
                            fetchJson('public-data/latest-scan.json')
                        ]).then(([status, latest]) => {
                            if (cancelled) return;
                            setStaticScan(latest);
                            setApiStatus({
                                status: 'static',
                                label: dataSourceName(latest.provider || status.provider || 'static'),
                                provider: latest.provider || status.provider || 'static',
                                warnings: [...(status.warnings || []), ...(latest.warnings || [])],
                                runAt: latest.runAt || status.runAt,
                                tradeDate: latest.tradeDate || status.tradeDate
                            });
                        }).catch(() => {
                            if (!cancelled) setApiStatus({ status: 'offline', label: '本地引擎', provider: 'local' });
                        });
                    });
                return () => { cancelled = true; };
            }, []);

            useEffect(() => {
                const tab = new URLSearchParams(window.location.search).get('tab');
                if (['监控', '历史', '策略', '回测'].includes(tab)) setActiveTab(tab);
            }, []);

            const showToast = (msg) => {
                if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                setToast(msg);
                toastTimerRef.current = setTimeout(() => setToast(''), 3000);
            };

            return (
                <div className="h-screen w-screen bg-[#0D0E11] text-zinc-300 flex flex-col font-sans select-none overflow-hidden relative">
                    {/* 个股详情全局弹窗 */}
                    <StockDetailModal stock={selectedStock} onClose={() => setSelectedStock(null)} />

                    {/* 全局 Toast 提示 */}
                    {toast && (
                        <div className="absolute top-16 left-1/2 -translate-x-1/2 bg-zinc-800/95 backdrop-blur-sm text-zinc-100 px-6 py-2.5 rounded-md shadow-[0_18px_60px_rgba(0,0,0,0.30)] z-50 text-sm font-medium border border-zinc-700/80">
                            {toast}
                        </div>
                    )}

                    <div className="h-14 border-b border-zinc-800/60 flex items-center px-4 md:px-6 bg-[#111216] justify-between z-40 shrink-0">
                        <div className="flex items-center w-full justify-between md:justify-start md:space-x-8">
                            <div className="flex items-center gap-2.5 shrink-0">
                                <span className="h-8 w-8 rounded-md border border-green-800/50 bg-green-950/35 flex items-center justify-center" aria-hidden="true"><Icons.LeekMark size={22} /></span>
                                <div className="hidden sm:flex flex-col justify-center leading-none">
                                    <span className="text-[15px] leading-4 font-bold text-green-500 tracking-wide">韭菜策略</span>
                                    <span className="mt-0.5 text-[9px] leading-[10px] font-mono font-medium text-zinc-500 tracking-normal">LINPO LAB</span>
                                </div>
                            </div>
                            <nav className="flex items-stretch space-x-1 md:space-x-2 overflow-x-auto no-scrollbar h-14">
                                {['监控', '历史', '策略', '回测'].map((item) => (
                                <button key={item} onClick={() => setActiveTab(item)}
                                    className={`relative px-2 md:px-3 pt-0.5 text-sm font-medium transition-colors whitespace-nowrap border-b-2 ${activeTab === item ? 'text-zinc-100 border-green-500/80 bg-zinc-900/45' : 'text-zinc-500 border-transparent hover:text-zinc-300 hover:border-zinc-800'}`}>
                                    {item}
                                </button>
                                ))}
                            </nav>
                        </div>
                    </div>

                    <div className="flex-1 flex overflow-hidden relative w-full bg-[#0D0E11]">
                        {activeTab === '监控' && <ViewMonitor appliedStrategy={appliedStrategy} positions={positions} setPositions={setPositions} historyTrades={historyTrades} setHistoryTrades={setHistoryTrades} executedSignalIds={executedSignalIds} setExecutedSignalIds={setExecutedSignalIds} apiStatus={apiStatus} staticScan={staticScan} onShowToast={showToast} onOpenStockDetail={setSelectedStock} />}
                        {activeTab === '历史' && <ViewHistory historyTrades={historyTrades} setHistoryTrades={setHistoryTrades} onShowToast={showToast} onOpenStockDetail={setSelectedStock} />}
                        {activeTab === '策略' && <ViewStrategy strategies={normalizedStrategies} setStrategies={setStrategies} appliedId={appliedStrategyId} setAppliedId={setAppliedStrategyId} onShowToast={showToast} />}
                        {activeTab === '回测' && <ViewBacktest strategies={normalizedStrategies} setStrategies={setStrategies} backtests={backtests} setBacktests={setBacktests} apiStatus={apiStatus} onShowToast={showToast} />}
                    </div>
                </div>
            );
        }

        // --- 渲染到 DOM ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
